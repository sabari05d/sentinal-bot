name: Sentinel Automated Briefings

on:
  schedule:
    - cron: '30 3 * * 1-5'    # 09:00 IST Mon–Fri (morning briefing)
    - cron: '30 10 * * 1-5'   # 16:00 IST Mon–Fri (evening briefing)

  workflow_dispatch:
    inputs:
      briefing_type:
        description: 'Briefing type'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - evening

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive  # This tells GitHub to actually download the 'backend' folder
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          # Path relative to the root of the repo
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Determine briefing type
        id: briefing-type
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.briefing_type }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "03" ]; then
              echo "type=morning" >> $GITHUB_OUTPUT
            else
              echo "type=evening" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run Sentinel Briefing
        working-directory: backend
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --briefing ${{ steps.briefing-type.outputs.type }}